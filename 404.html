<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | Kara Mullane Author</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --paper: #f7f1e4;
      --ink: #21334a;
      --accent: #be7e3a;
      --border: #d7c6a7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(190, 126, 58, 0.18), transparent 38%),
        linear-gradient(180deg, #fbf7ef 0%, var(--paper) 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(680px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255, 252, 246, 0.94);
      box-shadow: 0 18px 50px rgba(33, 51, 74, 0.12);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 18px auto 0;
      max-width: 38rem;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }

    .primary {
      background: var(--ink);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--border);
      color: var(--ink);
      background: transparent;
    }

    .note {
      margin-top: 20px;
      font-size: 0.95rem;
      color: rgba(33, 51, 74, 0.8);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">404 Error Page</p>
    <h1>That page is missing.</h1>
    <p>The mirrored site could not find the page you requested. You can return to the homepage or jump directly to the books section.</p>
    <div class="actions">
      <a class="primary" id="home-link" href="/">Return Home</a>
      <a class="secondary" id="books-link" href="/books/">Browse Books</a>
    </div>
    <p class="note" id="redirect-note">Redirecting to the homepage in a few seconds.</p>
  </main>
  <script>
    (function () {
      var segments = window.location.pathname.split('/').filter(Boolean);
      var projectRoot = segments.length ? '/' + segments[0] + '/' : '/';
      var homeLink = document.getElementById('home-link');
      var booksLink = document.getElementById('books-link');

      homeLink.href = projectRoot;
      booksLink.href = projectRoot + 'books/';

      window.setTimeout(function () {
        window.location.replace(projectRoot);
      }, 4500);
    })();
  </script>
</body>
</html>
